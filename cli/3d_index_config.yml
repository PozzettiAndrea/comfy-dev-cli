# 3D Index Configuration
# Paths and settings for the ComfyUI 3D nodes index pipeline

output:
  base_dir: /home/shadeform/ComfyUI-3D_nodes_index
  html_file: index.html
  data_dir: website_generation
  readmes_dir: website_generation/readmes

workers:
  fetch_readme: 50
  classify: 30
  clone: 5
  media: 20

cache:
  clone_dir: /tmp/comfyui_nodes_cache
  readme_max_age_days: 7

api:
  openrouter_model: deepseek/deepseek-chat
  openrouter_url: https://openrouter.ai/api/v1/chat/completions
  manager_url: https://raw.githubusercontent.com/ltdrdata/ComfyUI-Manager/main/custom-node-list.json
  stats_url: https://raw.githubusercontent.com/ltdrdata/ComfyUI-Manager/main/github-stats.json
  registry_url: https://api.comfy.org/nodes

classification:
  prompt_file: deepseek_prompt.txt
  readme_truncate_chars: 3000
  max_tokens: 300
  temperature: 0
